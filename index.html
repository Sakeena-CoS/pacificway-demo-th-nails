<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T&amp;H Nails Sooke — Sooke, BC</title>
  <style>
    :root { --bg:#fdf6f8; --fg:#2d2028; --accent:#c47b9e; --surface:#fff0f5; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; text-decoration: underline; }
    .container { width: 100%; max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    .hero { min-height: 100svh; display: flex; flex-direction: column; justify-content: center; padding: 4rem 1.5rem; text-align: center; background: linear-gradient(135deg, var(--bg) 0%, #f5dce8 100%); }
    .hero h1 { font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 120%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: var(--accent); }
    .hero .tagline { margin-top: 1.25rem; font-size: clamp(1rem, 3vw, 1.35rem); opacity: 0.7; max-width: 560px; margin-left: auto; margin-right: auto; }
    .btn { display: inline-block; margin-top: 2.5rem; padding: 1rem 2.25rem; background: var(--accent); color: #fff; border-radius: 12px; font-size: 1.1rem; font-weight: 700; transition: opacity 0.2s, transform 0.15s; }
    .btn:hover { opacity: 0.85; transform: translateY(-2px); text-decoration: none; }
    section { padding: 5rem 1.5rem; }
    section.alt { background: var(--surface); }
    section h2 { font-size: clamp(1.75rem, 5vw, 2.5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 2rem; text-align: center; }
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.25rem; }
    .card { background: var(--bg); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .card h3 { font-size: 1.05rem; font-weight: 600; color: var(--accent); margin-bottom: 0.4rem; }
    .contact-list { list-style: none; text-align: center; }
    .contact-list li { margin: 0.85rem 0; font-size: 1.1rem; }
    footer { padding: 2rem 1.5rem; text-align: center; font-size: 0.8rem; opacity: 0.4; border-top: 1px solid rgba(0,0,0,0.08); }
    footer a { color: inherit; }
    @media (max-width: 560px) { .services-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>T&amp;H Nails Sooke</h1>
      <p class="tagline">Nail artistry and care in Sooke</p>
      <a class="btn" href="tel:7784252222">Book Your Appointment — Call 778-425-2222</a>
    </div>
  </header>
  <main>
    <section id="services" class="alt">
      <div class="container">
        <h2>Our Services</h2>
        <div class="services-grid">
          <div class="card"><h3>Gel Nails</h3></div>
          <div class="card"><h3>Manicures</h3></div>
          <div class="card"><h3>Pedicures</h3></div>
          <div class="card"><h3>Nail Art</h3></div>
          <div class="card"><h3>Acrylics</h3></div>
        </div>
      </div>
    </section>
    <section id="contact">
      <div class="container">
        <h2>Find Us</h2>
        <ul class="contact-list">
          <li>📍 2400-6660 Sooke Road, Sooke, BC V9Z 0A4</li>
          <li>📞 <a href="tel:7784252222">778-425-2222</a></li>
          <li>✉️ <a href="mailto:tnh.nails@gmail.com">tnh.nails@gmail.com</a></li>
        </ul>
      </div>
    </section>
  </main>
  <footer>Demo site crafted by <a href="https://pacificwayai.com">PacificWay AI</a></footer>
</body>
</html>
